apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: ecommerce
  labels:
    app: order
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
      - name: order
        image: your-registry/ecommerce/order:latest
        ports:
        - containerPort: 8082
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: ecommerce
  labels:
    app: order
spec:
  ports:
  - port: 8082
    targetPort: 8082
  selector:
    app: order
  type: ClusterIP
