apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: ecommerce
  labels:
    app: product
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
      - name: product
        image: your-registry/ecommerce/product:latest
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product
  namespace: ecommerce
  labels:
    app: product
spec:
  ports:
  - port: 8081
    targetPort: 8081
  selector:
    app: product
  type: ClusterIP
