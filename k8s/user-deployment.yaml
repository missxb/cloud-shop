apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: ecommerce
  labels:
    app: user
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
      - name: user
        image: your-registry/ecommerce/user:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: ecommerce
  labels:
    app: user
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: user
  type: ClusterIP
