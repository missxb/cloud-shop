apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  namespace: ecommerce
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - host: ecommerce.example.com
    http:
      paths:
      - path: /api/v1/user
        pathType: Prefix
        backend:
          service:
            name: user
            port:
              number: 8080
      - path: /api/v1/product
        pathType: Prefix
        backend:
          service:
            name: product
            port:
              number: 8081
      - path: /api/v1/order
        pathType: Prefix
        backend:
          service:
            name: order
            port:
              number: 8082
      - path: /api/v1/payment
        pathType: Prefix
        backend:
          service:
            name: payment
            port:
              number: 8083
      - path: /api/v1/inventory
        pathType: Prefix
        backend:
          service:
            name: inventory
            port:
              number: 8084
