# 创建ecommerce命名空间
apiVersion: v1
kind: Namespace
metadata:
  name: ecommerce
  labels:
    name: ecommerce
---
# 创建ecommerce ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecommerce
  namespace: ecommerce
---
# 创建Role，只允许访问ecommerce命名空间内的资源
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecommerce-admin
  namespace: ecommerce
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
  resourceNames: []
---
# RoleBinding绑定
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecommerce-admin-binding
  namespace: ecommerce
subjects:
- kind: ServiceAccount
  name: ecommerce
  namespace: ecommerce
roleRef:
  kind: Role
  name: ecommerce-admin
  apiGroup: rbac.authorization.k8s.io
---
# 限制default ServiceAccount权限
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: default-viewer
  namespace: ecommerce
subjects:
- kind: ServiceAccount
  name: default
  namespace: ecommerce
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
